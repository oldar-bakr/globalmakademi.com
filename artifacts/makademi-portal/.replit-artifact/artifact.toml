kind = "web"
previewPath = "/"
title = "Makademi Training Hub"
version = "1.0.0"
id = "artifacts/makademi-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22731

[services.development]
run = "pnpm --filter @workspace/makademi-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/makademi-portal", "run", "build" ]
publicDir = "artifacts/makademi-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22731"
BASE_PATH = "/"
